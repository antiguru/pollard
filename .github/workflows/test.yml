name: "Test Suite"
on:
  push:
    branches:
      - main
  pull_request:

jobs:
  msrv:
    name: Determine MSRV
    runs-on: ubuntu-latest
    outputs:
      msrv: ${{ steps.msrv.outputs.msrv }}
    steps:
      - uses: actions/checkout@v6
      - id: msrv
        run: echo "msrv=$(grep '^rust-version' Cargo.toml | sed 's/.*"\(.*\)"/\1/')" >> "$GITHUB_OUTPUT"

  test:
    needs: msrv
    strategy:
      matrix:
        os:
          - ubuntu
          - macos
        toolchain:
          - stable
          - ${{ needs.msrv.outputs.msrv }}
    name: cargo test on ${{ matrix.os }}, rust ${{ matrix.toolchain }}
    runs-on: ${{ matrix.os }}-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: ${{ matrix.toolchain }}
      - name: Cargo test
        run: cargo test --workspace --all-targets
      - name: Cargo doc test
        run: cargo test --doc

  fmt:
    name: Cargo fmt
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: rustfmt
      - name: Cargo fmt
        run: cargo fmt --all -- --check

  clippy:
    name: Cargo clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          components: clippy
      - name: Cargo clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

  e2e:
    needs: msrv
    name: e2e on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}-latest
    strategy:
      matrix:
        os:
          - ubuntu
    env:
      POLLARD_E2E: "1"
    steps:
      - uses: actions/checkout@v6
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install samply
        run: cargo install samply --locked
      - name: Lower perf_event_paranoid so samply can record
        if: runner.os == 'Linux'
        run: echo '1' | sudo tee /proc/sys/kernel/perf_event_paranoid
      - name: Cargo test (e2e)
        run: cargo test --features e2e -- --include-ignored
