name: Release-plz

permissions:
  pull-requests: write
  contents: write
  id-token: write

on:
  push:
    branches:
      - main

concurrency:
  group: release-plz

jobs:
  release-plz:
    name: Release-plz
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          persist-credentials: true
      - name: Install Rust toolchain
        uses: actions-rust-lang/setup-rust-toolchain@v1

      # Precondition: refuse to publish if the plugin manifests have drifted
      # from Cargo.toml. The sync step below keeps them in lockstep on each
      # release PR; this guard catches the case where someone bypassed it.
      - name: Verify plugin manifests match Cargo.toml
        run: |
          set -euo pipefail
          cargo_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "pollard") | .version')
          plugin_version=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$cargo_version" != "$plugin_version" ]; then
            echo "::error::Cargo.toml v${cargo_version} disagrees with plugin.json (${plugin_version}). The release-plz PR's sync step should keep these in lockstep."
            exit 1
          fi

      - name: release-plz - publish on merged release
        id: release
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Zip into $RUNNER_TEMP rather than the working tree — the next
      # `release-plz - update release PR` step refuses to run if the
      # working directory has uncommitted changes.
      - name: Package plugin bundle
        if: steps.release.outputs.releases_created == 'true'
        run: |
          zip -r "$RUNNER_TEMP/pollard.skill" \
            .claude-plugin/ skills/ LICENSE-APACHE LICENSE-MIT README.md

      - name: Upload plugin bundle to release
        if: steps.release.outputs.releases_created == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ fromJSON(steps.release.outputs.releases)[0].tag }}
          files: ${{ runner.temp }}/pollard.skill

      - name: release-plz - update release PR
        id: release-pr
        uses: MarcoIeni/release-plz-action@v0.5
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # release-plz force-pushes the release branch on every run, so this
      # follow-up commit is reapplied after each release-pr update rather
      # than persisting across runs. The verify step at the top of the job
      # is the safety net if this ever fails to run.
      - name: Sync plugin manifest versions to Cargo.toml
        if: steps.release-pr.outputs.prs_created == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ fromJSON(steps.release-pr.outputs.pr).number }}
        run: |
          set -euo pipefail
          gh pr checkout "$PR_NUMBER"
          cargo_version=$(cargo metadata --no-deps --format-version 1 \
            | jq -r '.packages[] | select(.name == "pollard") | .version')
          plugin_version=$(jq -r '.version' .claude-plugin/plugin.json)
          if [ "$cargo_version" = "$plugin_version" ]; then
            echo "Plugin manifest already at v${cargo_version}."
            exit 0
          fi
          jq --arg v "$cargo_version" '.version = $v' \
            .claude-plugin/plugin.json > .claude-plugin/plugin.json.tmp
          mv .claude-plugin/plugin.json.tmp .claude-plugin/plugin.json
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add .claude-plugin/plugin.json
          git commit -m "chore: sync plugin manifest to v${cargo_version}"
          git push
