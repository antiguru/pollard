name: Release plugin

# Triggers when release-plz pushes a `v*` tag for a pollard release.
# Packages the Claude Code plugin bundle (.claude-plugin/, skills/,
# README, LICENSE-*) into a `.skill` zip and attaches it to the
# release release-plz already created — so MCP-only users keep the
# crates.io install path while plugin users get a one-shot artifact.
#
# Also runnable manually via workflow_dispatch with an existing tag
# input — packages whatever is on the dispatch branch and uploads to
# that tag's release. Useful for attaching a fresh bundle to an
# already-cut release without bumping the version.

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Existing tag to (re)attach the plugin bundle to (e.g. v0.0.6)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Verify version tag matches plugin manifests
        env:
          REF: ${{ inputs.tag || github.ref_name }}
        run: |
          tag_version="${REF#v}"
          plugin_version=$(jq -r '.version' .claude-plugin/plugin.json)
          marketplace_version=$(jq -r '.plugins[0].version' .claude-plugin/marketplace.json)
          if [ "$tag_version" != "$plugin_version" ] || [ "$tag_version" != "$marketplace_version" ]; then
            echo "::error::Tag $REF (version $tag_version) disagrees with plugin.json ($plugin_version) / marketplace.json ($marketplace_version). Bump both manifests in the release-plz PR before tagging."
            exit 1
          fi

      - name: Package plugin
        run: |
          mkdir -p dist
          zip -r "dist/pollard.skill" \
            .claude-plugin/ skills/ LICENSE-APACHE LICENSE-MIT README.md

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          files: dist/*.skill
